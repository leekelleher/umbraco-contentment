name: Release Package

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"

jobs:
  build:

    runs-on: windows-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: src/Umbraco.Community.Contentment.Client/.nvmrc
        registry-url: 'https://npm.pkg.github.com'
        scope: '@leekelleher'
    - run: npm i
      working-directory: src/Umbraco.Community.Contentment.Client
    - run: npm run build
      working-directory: src/Umbraco.Community.Contentment.Client

    - name: Build TypeScript declarations
      run: npm run build:api
      working-directory: src/Umbraco.Community.Contentment.Client

    - name: Set npm package version from tag
      run: npm pkg set version=${{github.ref_name}}
      working-directory: src/Umbraco.Community.Contentment.Client

    - name: Push to GitHub npm
      run: npm publish
      working-directory: src/Umbraco.Community.Contentment.Client
      env:
        NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Build and pack
      run: dotnet pack src\Umbraco.Community.Contentment\Umbraco.Community.Contentment.csproj -c Release /p:Version=${{github.ref_name}}

    - name: Push to GitHub NuGet
      run: dotnet nuget push **\*.nupkg -k ${{secrets.GITHUB_TOKEN}} -s https://nuget.pkg.github.com/leekelleher/index.json

    - name: Push to NuGet
      if: contains(github.ref_name, '-') == false
      run: dotnet nuget push **\*.nupkg -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
